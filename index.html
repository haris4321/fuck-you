<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <audio id="birthdaySong" preload="auto">
        <source src="https://www.zedge.net/notification-sounds/f218e179-a6b3-45eb-9975-20d84ff54a44" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="card">
            <div class="img-box">
                <img src="https://via.placeholder.com/150" alt="Birthday Person">
            </div>
            <div class="content">
                <h2>Happy Birthday!<br><span>Pyary Dost</span></h2>
                <p>Allah tumhein hamesha muskurata rakhay aur dunya ki har khushi naseeb kary! 🌟</p>
                <button id="surpriseBtn" onclick="celebrate()">Click for Surprise! 🎵</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
